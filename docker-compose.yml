version: '3.8'

services:
  empadronamiento-api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: benitezlabs_empadronamiento_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      
      # -----------------------------------------------------------
      # BASE DE DATOS (MariaDB)
      # -----------------------------------------------------------
      - ConnectionStrings__DefaultConnection=Server=${DB_SERVER};Port=${DB_PORT};Database=${DB_NAME};User=${DB_USER};Password=${DB_PASSWORD};
      
      # -----------------------------------------------------------
      # SEGURIDAD Y JWT
      # -----------------------------------------------------------
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__DurationInMinutes=${JWT_DURATION}
      
      # -----------------------------------------------------------
      # AWS (S3 y Rekognition)
      # -----------------------------------------------------------
      - AWS__Region=${AWS_REGION}
      - AWS__Credentials__AccessKey=${AWS_ACCESS_KEY}
      - AWS__Credentials__SecretKey=${AWS_SECRET_KEY}
      
      - AWS__S3__Buckets__Empadronamiento=${AWS_S3_BUCKET_EMPADRONAMIENTO}
      - AWS__S3__Buckets__Rid=${AWS_S3_BUCKET_RID}
      - AWS__S3__Buckets__PrefixFolder=${AWS_S3_PREFIX}
      
      - AWS__Rekognition__Collections__Empadronamiento=${AWS_REK_COLLECTION_EMP}
      - AWS__Rekognition__Collections__Rid=${AWS_REK_COLLECTION_RID}
      - AWS__Rekognition__FaceMatchThreshold=90
      - AWS__Rekognition__MaxFaces=5
      
      # -----------------------------------------------------------
      # EMAILS (Resend)
      # -----------------------------------------------------------
      - Resend__ApiToken=${RESEND_TOKEN}